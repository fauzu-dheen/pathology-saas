services:
  - type: web
    name: pathology-saas-api
    env: python
    rootDir: backend
    buildCommand: uv sync --frozen --no-dev
    startCommand: uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_MINUTES
        value: "10080"
      - key: PENDING_TOKEN_EXPIRES_MINUTES
        value: "15"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_SLIDES_BUCKET
        value: slides
